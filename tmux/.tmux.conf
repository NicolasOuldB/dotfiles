# General settings
set -a terminal-features "tmux-256color:RGB"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g prefix C-SPACE
set -g mouse on
set -g status-left-length 100
set -g set-clipboard on

# Bindings
unbind r
bind r source-file ~/.tmux.conf

# Vim mode
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"

# Theme
set -g status-position top
set -g status-justify absolute-centre
set -g window-status-current-style "fg=#e78a4e bold"
set -g status-style "bg=#282828"
set -g status-right '\
#[default]#[fg=#{?client_prefix,#ea6962,#6f8352}]#[bg=#{?client_prefix,#ea6962,#6f8352},fg=#222526] #S '
set -g status-left '#[bg=#{?client_prefix,#ea6962,#45707a},fg=#222526] #{b:pane_current_path} #[fg=#{?client_prefix,#ea6962,#45707a}, bg=default]'

# CURSOR SETTINGS
# ALLOW NVIM TO OVERRIDE CURSOR SHAPE DEPENING ON THE CURRENT MODE
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
